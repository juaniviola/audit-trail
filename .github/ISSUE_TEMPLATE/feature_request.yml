name: Feature request
description: Proponer una mejora o nueva capacidad
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema
      description: Qué problema real resuelve esto.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Propuesta
      description: Cómo imaginás que debería funcionar.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Qué otras opciones evaluaste y sus tradeoffs.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Criterios de aceptación
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
