services:
  app:
    image: ${AUDIT_TRAIL_IMAGE:-audit-trail:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-trail-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 5000
      FRONTEND_PORT: 3000
      INTERNAL_API_URL: http://127.0.0.1:5000
      RUN_MIGRATIONS: 'true'
      WAIT_FOR_DB: 'true'
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: audit_trail
      DB_SSL: 'false'
      CORS_ORIGINS: http://localhost:3000
    ports:
      - '3000:3000'
      - '5000:5000'

  postgres:
    image: postgres:16-alpine
    container_name: audit-trail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audit_trail
    ports:
      - '5432:5432'
    volumes:
      - audit_trail_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d audit_trail']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  audit_trail_pg_data:
